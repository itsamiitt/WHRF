<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>WRHWFOUR — CRM Dashboard</title>
  <meta name="description" content="WRHWFOUR CRM & CMS Dashboard — Manage contacts, leads, deals, tasks, and customize your landing page.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Favicon -->
  <link rel="icon" href="../assets/images/logo.png" type="image/png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <!-- Dashboard Styles -->
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div id="app">
    <!-- App Shell rendered by JS -->
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#5a5e76">
      <div style="text-align:center">
        <div style="width:48px;height:48px;border:3px solid #2a2e42;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div>
        <div>Loading Dashboard...</div>
      </div>
    </div>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Scripts (order matters) -->
  <script src="js/store.js"></script>
  <script src="js/components.js"></script>
  <script src="js/dashboard-home.js"></script>
  <script src="js/contacts.js"></script>
  <script src="js/leads.js"></script>
  <script src="js/deals.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/channels.js"></script>
  <script src="js/cms-editor.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
