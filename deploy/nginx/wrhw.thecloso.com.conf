server {
    listen 80;
    listen [::]:80;
    server_name wrhw.thecloso.com;

    root /var/www/wrhw.thecloso.com/current;
    index index.html;

    access_log /var/log/nginx/wrhw.thecloso.com.access.log;
    error_log /var/log/nginx/wrhw.thecloso.com.error.log;

    client_max_body_size 10m;

    location = /index.html {
        return 301 /;
    }

    location / {
        try_files $uri $uri.html $uri/ $uri/index.html =404;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|webp|ico|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # If you have a real backend running on this EC2 instance, uncomment and
    # adjust the upstream below, then point the frontend to /api/.
    #
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
